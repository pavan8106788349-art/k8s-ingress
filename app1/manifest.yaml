apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
  labels:
    project: roboshop
    tier: frontend
    component: app1
spec:
  replicas: 2
  selector:
    matchLabels:
      project: roboshop
      tier: frontend
      component: app1
  template:
    metadata:
      labels:
        project: roboshop
        tier: frontend
        component: app1
    spec:
      containers:
      - name: app1
        image: pavankumarsri/app1:1.0.0
---
# Service must be NodePort -- old ALB ingress controller uses target-type: instance
# ALB registers EC2 nodes, traffic comes in on NodePort, then forwards to pod
apiVersion: v1
kind: Service
metadata:
  name: app1
spec:
  type: NodePort
  selector:
    project: roboshop
    tier: frontend
    component: app1
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80