apiVersion: apps/v1
kind: Deployment
metadata:
  name: app2
  labels:
    project: roboshop1
    tier: frontend
    component: app2
spec:
  replicas: 2
  selector:
    matchLabels:
      project: roboshop1
      tier: frontend
      component: app2
  template:
    metadata:
      labels:
        project: roboshop1
        tier: frontend
        component: app2
    spec:
      containers:
      - name: app2
        image: pavankumarsri/app2:1.0.0
---
  apiVersion: v1
  kind: Service
  metadata:
  name: app2
  spec:
  type: NodePort
  selector:
    project: roboshop1
    tier: frontend
    component: app2
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
---
 apiVersion: networking.k8s.io/v1beta1
 kind: Ingress
 metadata:
  name: app2
  annotations:
    kubernetes.io/ingress.class: "alb"
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/tags: Environment=dev,Project=roboshop1
    alb.ingress.kubernetes.io/target-type: instance
 spec:
  rules:
  - host: "app2.daws88s.online"
    http:
      paths:
      - path: /
        backend:
          serviceName: app2
          servicePort: 80  